trigger:
  branches:
    include: [main]
  paths:
    include: [infrastructure/*]

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: 'AI-Agents-Terraform'
  - name: serviceConnection
    value: 'Azure-AI-Agents'
  - name: terraformWorkingDir
    value: '$(System.DefaultWorkingDirectory)/infrastructure'
  - name: backendRg
    value: 'terraform-state-rg'
  - name: backendStorage
    value: 'yourtfstateaccount'         # Replace with your TF state storage account name
  - name: backendContainer
    value: 'tfstate'
  - name: backendKey
    value: 'ai-agents.terraform.tfstate'

stages:
  # ── Plan ──────────────────────────────────────────────
  - stage: Plan
    displayName: 'Terraform Plan'
    jobs:
      - job: Plan
        displayName: 'Init + Plan'
        steps:
          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: 'latest'

          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(terraformWorkingDir)'
              backendServiceArm: '$(serviceConnection)'
              backendAzureRmResourceGroupName: '$(backendRg)'
              backendAzureRmStorageAccountName: '$(backendStorage)'
              backendAzureRmContainerName: '$(backendContainer)'
              backendAzureRmKey: '$(backendKey)'

          - task: TerraformTaskV4@4
            displayName: 'Terraform Plan'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: '$(terraformWorkingDir)'
              environmentServiceNameAzureRM: '$(serviceConnection)'
              commandOptions: '-out=tfplan -input=false'

          - publish: '$(terraformWorkingDir)/tfplan'
            displayName: 'Publish Plan Artifact'
            artifact: 'tfplan'

  # ── Apply ─────────────────────────────────────────────
  - stage: Apply
    displayName: 'Terraform Apply'
    dependsOn: Plan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: Apply
        displayName: 'Apply Infrastructure Changes'
        environment: 'production'       # Configure approval gate on this environment
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: 'Install Terraform'
                  inputs:
                    terraformVersion: 'latest'

                - download: current
                  artifact: 'tfplan'
                  displayName: 'Download Plan Artifact'

                - task: TerraformTaskV4@4
                  displayName: 'Terraform Init'
                  inputs:
                    provider: 'azurerm'
                    command: 'init'
                    workingDirectory: '$(terraformWorkingDir)'
                    backendServiceArm: '$(serviceConnection)'
                    backendAzureRmResourceGroupName: '$(backendRg)'
                    backendAzureRmStorageAccountName: '$(backendStorage)'
                    backendAzureRmContainerName: '$(backendContainer)'
                    backendAzureRmKey: '$(backendKey)'

                - task: TerraformTaskV4@4
                  displayName: 'Terraform Apply'
                  inputs:
                    provider: 'azurerm'
                    command: 'apply'
                    workingDirectory: '$(terraformWorkingDir)'
                    environmentServiceNameAzureRM: '$(serviceConnection)'
                    commandOptions: '$(Pipeline.Workspace)/tfplan/tfplan'
